title = "fe_benchmark"
xyz = "fe.xyz"
out_dir = "out_dft_zig"
units = "angstrom"
linalg_backend = "accelerate"

[[pseudopotential]]
element = "Fe"
path = "../../pseudo/Fe_ONCV_PBE-1.2.upf"
format = "upf"

[cell]
# BCC primitive cell: a/2 * [(-1,1,1), (1,-1,1), (1,1,-1)]
# a = 2.87 Angstrom, a/2 = 1.435 Angstrom
a1 = [-1.435, 1.435, 1.435]
a2 = [1.435, -1.435, 1.435]
a3 = [1.435, 1.435, -1.435]

[scf]
enabled = true
solver = "iterative"
xc = "pbe"
ecut_ry = 60.0
kmesh = [8, 8, 8]
grid = [0, 0, 0]
mixing_beta = 0.3
pulay_history = 8
pulay_start = 4
max_iter = 100
convergence = 1e-6
# Note: diemac not used for Fe — spin-polarized metals are sensitive to
# strong G=0 damping, which can suppress magnetization convergence.
use_rfft = true
smearing = "fermi"
smear_ry = 0.02
nspin = 2
spinat = [4.0]

[band]
solver = "iterative"
points = 20
nbands = 20
use_symmetry = false
iterative_max_iter = 100

[ewald]
tol = 1e-8

# BCC Brillouin zone: G -> H -> N -> G -> P -> H
# G = (0, 0, 0)
# H = (1/2, -1/2, 1/2)
# N = (0, 0, 1/2)
# P = (1/4, 1/4, 1/4)

[[band.path]]
label = "G"
k = [0.0, 0.0, 0.0]

[[band.path]]
label = "H"
k = [0.5, -0.5, 0.5]

[[band.path]]
label = "N"
k = [0.0, 0.0, 0.5]

[[band.path]]
label = "G"
k = [0.0, 0.0, 0.0]

[[band.path]]
label = "P"
k = [0.25, 0.25, 0.25]

[[band.path]]
label = "H"
k = [0.5, -0.5, 0.5]
