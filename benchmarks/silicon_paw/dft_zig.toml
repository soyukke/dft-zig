title = "silicon_paw_test"
xyz = "silicon.xyz"
out_dir = "out_dft_zig"
units = "angstrom"
linalg_backend = "accelerate"

[[pseudopotential]]
element = "Si"
path = "../../pseudo/Si.pbe-n-kjpaw_psl.1.0.0.UPF"
format = "upf"

# Primitive cell (FCC): a/2 * [(0,1,1), (1,0,1), (1,1,0)]
# a = 5.431 Angstrom
[cell]
a1 = [0.0, 2.7155, 2.7155]
a2 = [2.7155, 0.0, 2.7155]
a3 = [2.7155, 2.7155, 0.0]

[scf]
enabled = true
solver = "iterative"
xc = "pbe"
ecut_ry = 15.0
kmesh = [4, 4, 4]
mixing_beta = 0.3
max_iter = 50
convergence = 1e-6
use_rfft = true
fft_backend = "fftw"

[band]
solver = "iterative"
points = 20
nbands = 8
use_symmetry = false
iterative_max_iter = 100
iterative_tol = 1e-8
path = "G-X-L"

[ewald]
tol = 1e-8
