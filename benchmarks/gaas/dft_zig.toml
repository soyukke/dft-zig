title = "gaas_benchmark"
xyz = "gaas.xyz"
out_dir = "out_dft_zig"
units = "angstrom"
linalg_backend = "accelerate"

[[pseudopotential]]
element = "Ga"
path = "../../pseudo/Ga_ONCV_PBE-1.2.upf"
format = "upf"

[[pseudopotential]]
element = "As"
path = "../../pseudo/As_ONCV_PBE-1.2.upf"
format = "upf"

# Primitive cell (FCC): a/2 * [(0,1,1), (1,0,1), (1,1,0)]
# a = 5.653 Angstrom
[cell]
a1 = [0.0, 2.8265, 2.8265]
a2 = [2.8265, 0.0, 2.8265]
a3 = [2.8265, 2.8265, 0.0]

[scf]
enabled = true
solver = "iterative"
xc = "pbe"
ecut_ry = 30.0
kmesh = [4, 4, 4]
grid = [0, 0, 0]
mixing_beta = 0.3
pulay_history = 8
pulay_start = 4
max_iter = 50
convergence = 1e-6
use_rfft = true
smearing = "fermi"
smear_ry = 0.01

[band]
solver = "iterative"
points = 20
nbands = 14
use_symmetry = false
iterative_max_iter = 100
path = "G-X-W-K-G-L"

[ewald]
tol = 1e-8
