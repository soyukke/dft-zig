title = "aluminum_benchmark_fair_comparison"
xyz = "aluminum.xyz"
out_dir = "out_dft_zig_fair"
units = "angstrom"
linalg_backend = "accelerate"
threads = 1

[[pseudopotential]]
element = "Al"
path = "../../pseudo/Al.upf"
format = "upf"

# Primitive cell (FCC): a/2 * [(0,1,1), (1,0,1), (1,1,0)]
# a = 4.05 Angstrom
[cell]
a1 = [0.0, 2.025, 2.025]
a2 = [2.025, 0.0, 2.025]
a3 = [2.025, 2.025, 0.0]

[scf]
enabled = true
solver = "iterative"
xc = "pbe"
ecut_ry = 15.0
kmesh = [6, 6, 6]
kmesh_shift = [0.0, 0.0, 0.0]
grid = [24, 24, 24]
mixing_beta = 0.3
pulay_history = 8
max_iter = 80
convergence = 1e-8
iterative_max_iter = 200
iterative_tol = 1e-8
iterative_max_subspace = 32
iterative_init_diagonal = true
use_rfft = true
fft_backend = "fftw"
smearing = "fermi"
smear_ry = 0.02

[band]
solver = "iterative"
points = 20
nbands = 8
use_symmetry = false
iterative_max_iter = 200
iterative_tol = 1e-8
iterative_max_subspace = 32
iterative_init_diagonal = true
path = "G-X-W-K-G-L"

[ewald]
tol = 1e-8
