title = "silicon"
xyz = "examples/silicon.xyz"
out_dir = "out/silicon"
units = "angstrom"
linalg_backend = "accelerate"

[[pseudopotential]]
element = "Si"
path = "pseudo/Si.upf"
format = "upf"

[cell]
a1 = [5.431, 0.0, 0.0]
a2 = [0.0, 5.431, 0.0]
a3 = [0.0, 0.0, 5.431]

[scf]
enabled = true
solver = "iterative"
ecut_ry = 40.0
kmesh = [6, 6, 6]
grid = [32, 32, 32]
mixing_beta = 0.3
max_iter = 50
convergence = 1e-6
profile = true

[band]
points = 60
nbands = 8
path = "auto"

[ewald]
alpha = 0.0
rcut = 0.0
gcut = 0.0
tol = 1e-8
